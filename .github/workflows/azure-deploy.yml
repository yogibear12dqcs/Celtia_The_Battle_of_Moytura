# ─────────────────────────────────────────────────────────────────────────────
# Celtia – Azure App Service Deployment Pipeline (.NET 10 / ASP.NET Core)
#
# HOW TO CONNECT YOUR AZURE APP SERVICE
# ──────────────────────────────────────
# 1. In the Azure Portal, create a Windows App Service with runtime ".NET 10".
# 2. Open the App Service → Deployment Center → Download publish profile.
# 3. In GitHub: Settings → Secrets and variables → Actions → New repository secret
#    Name:  AZURE_WEBAPP_PUBLISH_PROFILE
#    Value: (paste the full contents of the downloaded .PublishSettings file)
# 4. Set AZURE_WEBAPP_NAME below to match your App Service name (e.g. "celtia-game").
# 5. Push to main – the workflow will build and deploy automatically.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main                                    # deploy on every push to main
  workflow_dispatch:                            # allow manual trigger from GitHub UI

env:
  # ── Change this to the name of your Azure App Service ──────────────────────
  AZURE_WEBAPP_NAME: celtia-game
  # ── .NET project and test project paths ────────────────────────────────────
  PROJECT_PATH: CeltiaGame/CeltiaGame.csproj
  TEST_PROJECT_PATH: CeltiaGame.Tests/CeltiaGame.Tests.csproj
  # ── dotnet publish output folder ───────────────────────────────────────────
  PUBLISH_DIR: publish

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read   # needed to checkout the repository

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install .NET 10 SDK
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # 3. Restore all project dependencies once (shared by test and publish steps)
      - name: Restore dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      # 4. Run unit / integration tests – deployment is blocked if any test fails
      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} -c Release --no-restore

      # 5. Build and publish the ASP.NET Core project
      - name: Build and publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_DIR }} --no-restore

      # 6. Deploy the publish output to Azure App Service
      #    azure/webapps-deploy zips the folder and pushes via the Kudu REST API.
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
