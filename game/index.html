<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celtia – The Battle of Moytura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      color: #fff;
      user-select: none;
    }
    #game-container {
      position: relative;
      width: 640px;
      max-width: 100vw;
    }
    canvas {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #444;
    }
    #controls-hint {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    #controls-hint span { color: #ccc; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="controls-hint">
      <span>Arrow Keys</span> – Move &nbsp;|&nbsp;
      <span>Space</span> – Attack &nbsp;|&nbsp;
      <span>Esc</span> – Return to Title
    </div>
  </div>

  <script>
  // =====================================================================
  // CELTIA – THE BATTLE OF MOYTURA  (HTML5 Canvas port)
  // Original game by Craig Foucher, CIS 487, University of Michigan–Dearborn, 2002
  // Browser port preserves all original game mechanics faithfully.
  // =====================================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  const SW = 640, SH = 480, OFFSET = 125;  // screen + top HUD bar

  // ── Game states ──────────────────────────────────────────────────────
  const S = { LOADING: 0, INTRO: 1, PLAYING: 2, DEAD: 3, WIN: 4 };
  let state = S.LOADING;

  // ── Direction constants ──────────────────────────────────────────────
  const D = {
    EAST:0, NORTH:1, WEST:2, SOUTH:3,
    S_ATK:4, N_ATK:5, W_ATK:6, E_ATK:7,
    S_IDL:8, N_IDL:9, W_IDL:10, E_IDL:11
  };

  // ── Keyboard ─────────────────────────────────────────────────────────
  const keys = {};
  window.addEventListener('keydown', e => {
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
      e.preventDefault();
    keys[e.code] = true;
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // ── Asset loader ─────────────────────────────────────────────────────
  const IMG = {}, SND = {};
  let total = 0, loaded = 0;

  function img(key, src) {
    total++;
    const el = new Image();
    el.onload = el.onerror = () => { loaded++; };
    el.src = src;
    IMG[key] = el;
  }

  function snd(key, src) {
    const el = new Audio(src);
    el.preload = 'auto';
    SND[key] = el;
  }

  function play(key, loop) {
    const s = SND[key]; if (!s) return;
    try { s.loop = !!loop; s.currentTime = 0; s.play().catch(()=>{}); } catch(_) {}
  }
  function stop(key) {
    const s = SND[key]; if (!s) return;
    try { s.pause(); s.currentTime = 0; } catch(_) {}
  }
  function stopAll() { Object.values(SND).forEach(s => { try { s.pause(); s.currentTime=0; } catch(_){} }); }

  // Backgrounds
  for (let i = 0; i <= 33; i++) img(`bg${i}`, `assets/backgrounds/arrivalback${i}.png`);
  img('bgIntro', 'assets/backgrounds/intro.png');
  img('bgWin',   'assets/backgrounds/gamewin.png');

  // Sprites
  img('lugh',     'assets/bobs/LughAll.png');
  img('firbolg',  'assets/bobs/FirBolg.png');
  img('fomorian', 'assets/bobs/Fomorian.png');
  img('eiric',    'assets/bobs/EiricBOB.png');
  img('balor',    'assets/bobs/BalorBOB.png');
  img('domnann',  'assets/bobs/DomnannBOB.png');
  img('tree1',    'assets/bobs/TreeBOB1.png');
  img('tree2',    'assets/bobs/TreeBOB2.png');
  img('swamp1',   'assets/bobs/SwampBOB1.png');
  img('swamp2',   'assets/bobs/SwampBOB2.png');
  img('water1',   'assets/bobs/WaterBOB1.png');
  img('water2',   'assets/bobs/WaterBOB2.png');
  img('rock1',    'assets/bobs/RockBOB1.png');
  img('rock2',    'assets/bobs/RockBOB2.png');
  img('stone1',   'assets/bobs/StoneBOB1.png');
  img('stone2',   'assets/bobs/StoneBOB2.png');
  img('mtn',      'assets/bobs/MountainBOB1.png');
  img('bridge',   'assets/bobs/BridgeBOB1.png');
  img('atree',    'assets/bobs/AncientTreeBOB.png');
  img('door',     'assets/bobs/DoorBOB.png');
  img('castle',   'assets/bobs/CastleBOB.png');

  // Sounds
  snd('arrival',        'assets/sounds/arrival.WAV');
  snd('attack',         'assets/sounds/attack.wav');
  snd('bossatk',        'assets/sounds/bossattack.wav');
  snd('bossdmg',        'assets/sounds/bossdamage.wav');
  snd('damage',         'assets/sounds/damage.wav');
  snd('end',            'assets/sounds/end.wav');
  snd('evil',           'assets/sounds/evil.wav');
  snd('fbdmg',          'assets/sounds/firbolgdamage.wav');
  snd('fmdmg',          'assets/sounds/fomoriandamage.wav');
  snd('intro',          'assets/sounds/intro.WAV');
  snd('fmatk',          'assets/sounds/fomorianattack.wav');
  snd('fbatk',          'assets/sounds/firbolgattack.wav');

  // ── Sprite-sheet frame builder ────────────────────────────────────────
  // Returns array of {sx,sy,sw,sh} for cells in a grid
  function frames(fw, fh, cols, count) {
    const out = [];
    for (let n = 0; n < count; n++)
      out.push({ sx: (n % cols) * fw, sy: Math.floor(n / cols) * fh, sw: fw, sh: fh });
    return out;
  }

  // Lugh: sheet is 4 cols wide, frames 0-3=row0, 4-7=row1, … 20-22=row5
  const LUGH_W=44, LUGH_H=60;
  const F_LUGH = frames(LUGH_W, LUGH_H, 4, 23);
  // Animation sequences per direction [direction] = [frameIdx, ...]
  const A_LUGH = [
    [8,9,8,9],      // D.EAST
    [3,4,3,4],      // D.NORTH
    [6,7,6,7],      // D.WEST
    [0,1,0,1],      // D.SOUTH
    [10,11,12,10],  // D.S_ATK
    [13,14,15,13],  // D.N_ATK
    [16,17,18,16],  // D.W_ATK
    [21,19,20,21],  // D.E_ATK
    [2,2,2,2],      // D.S_IDL
    [5,5,5,5],      // D.N_IDL
    [6,6,6,6],      // D.W_IDL
    [8,8,8,8],      // D.E_IDL
  ];

  // FirBolg: 280×200, frame 56×52, 4 cols, 10 frames
  const FB_W=56, FB_H=52;
  const F_FB = frames(FB_W, FB_H, 4, 10);
  const A_FB = [[8,9,8,9],[3,5,4,5],[6,7,6,7],[0,2,1,2]];

  // Fomorian: 300×300, frame 62×76, 4 cols, 12 frames
  const FM_W=62, FM_H=76;
  const F_FM = frames(FM_W, FM_H, 4, 12);
  const A_FM = [[9,11,10,11],[3,5,4,5],[6,8,7,8],[0,2,1,2]];

  // Bosses: all use 72×80, 4 cols
  const BS_W=72, BS_H=80;
  const F_BOSS = frames(BS_W, BS_H, 4, 12);  // 12 frames (enough for all)
  const A_BOSS_E = [[8,9,8,9],[3,5,4,5],[6,7,6,7],[0,2,1,2]];
  const A_BOSS_D = [[9,11,10,11],[3,5,4,5],[6,8,7,8],[0,2,1,2]];

  // Obstacle sizes (w,h that the BOB clips to)
  const T1W=82,T1H=88, T2W=32,T2H=84;
  const SWW=80,SWH=80, WWW=80,WWH=80;
  const R1W=40,R1H=44, R2W=40,R2H=44;
  const S1W=56,S1H=106, S2W=30,S2H=104;
  const MW=80,MH=80, BRW=80,BRH=150;
  const ATW=96,ATH=126, DW=40,DH=40;
  const CSW=256,CSH=192;

  // ── Entity helpers ────────────────────────────────────────────────────
  function makeSprite(key, fArr, anims, x, y, w, h, spd, hp, page) {
    return {
      key, fArr, anims,
      x, y, w, h,
      startX: x, startY: y,   // original spawn position (for reset)
      speed: spd, hp, maxHp: hp, page,
      active: true,
      dir: D.SOUTH,
      aIdx: 0, aTick: 0, aSpd: 8
    };
  }

  // Advance animation tick (4-frame cycle)
  function tick(e, speed) {
    e.aTick++;
    if (e.aTick >= speed) {
      e.aTick = 0;
      e.aIdx = (e.aIdx + 1) % e.anims[e.dir].length;
    }
  }

  function frameOf(e) { return e.anims[e.dir][e.aIdx % e.anims[e.dir].length]; }

  function drawE(e) {
    const img = IMG[e.key];
    if (!img || !img.complete || img.naturalWidth === 0) return;
    const f = e.fArr[frameOf(e)];
    if (!f) return;
    ctx.drawImage(img, f.sx, f.sy, f.sw, f.sh, Math.round(e.x), Math.round(e.y), f.sw, f.sh);
  }

  function drawImg(key, sx, sy, sw, sh, dx, dy, dw, dh) {
    const img = IMG[key];
    if (!img || !img.complete || img.naturalWidth === 0) return;
    ctx.drawImage(img, sx, sy, sw, sh, Math.round(dx), Math.round(dy), dw, dh);
  }

  function drawFull(key) {
    const img = IMG[key];
    if (!img || !img.complete || img.naturalWidth === 0) return;
    ctx.drawImage(img, 0, 0, SW, SH);
  }

  // AABB collision
  function hit(ax,ay,aw,ah, bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }
  function hitE(a,b) { return hit(a.x,a.y,a.w,a.h, b.x,b.y,b.w,b.h); }
  function hitO(e,o)  { return hit(e.x,e.y,e.w,e.h, o.x,o.y,o.w,o.h); }

  // ── Player (Lugh) ─────────────────────────────────────────────────────
  const lugh = {
    key:'lugh', fArr:F_LUGH, anims:A_LUGH,
    x:200, y:256, w:LUGH_W, h:LUGH_H,
    speed:3, hp:50, maxHp:50,
    dir:D.SOUTH, aIdx:0, aTick:0, aSpd:10,
    moving:false, attacking:false,
    iFrames:0       // invulnerability frames after being hit
  };

  // ── Minion enemies ────────────────────────────────────────────────────
  const firBolgs = [
    makeSprite('firbolg',F_FB,A_FB,100,380, FB_W,FB_H, 1,10, 9),
    makeSprite('firbolg',F_FB,A_FB,500,200, FB_W,FB_H, 1,10, 10),
    makeSprite('firbolg',F_FB,A_FB,100,380, FB_W,FB_H, 1,10, 14),
    makeSprite('firbolg',F_FB,A_FB,100,200, FB_W,FB_H, 1,10, 16),
    makeSprite('firbolg',F_FB,A_FB,320,240, FB_W,FB_H, 1,10, 16),
    makeSprite('firbolg',F_FB,A_FB,500,200, FB_W,FB_H, 1,10, 16),
    makeSprite('firbolg',F_FB,A_FB,200,250, FB_W,FB_H, 1,10, 17),
    makeSprite('firbolg',F_FB,A_FB,200,250, FB_W,FB_H, 1,10, 18),
    makeSprite('firbolg',F_FB,A_FB,440,250, FB_W,FB_H, 1,10, 18),
    makeSprite('firbolg',F_FB,A_FB,100,200, FB_W,FB_H, 1,10, 20),
    makeSprite('firbolg',F_FB,A_FB,320,240, FB_W,FB_H, 1,10, 20),
    makeSprite('firbolg',F_FB,A_FB,500,200, FB_W,FB_H, 1,10, 20),
    makeSprite('firbolg',F_FB,A_FB,320,300, FB_W,FB_H, 1,10, 21),
    makeSprite('firbolg',F_FB,A_FB,500,300, FB_W,FB_H, 1,10, 22),
    makeSprite('firbolg',F_FB,A_FB,450,200, FB_W,FB_H, 1,10, 23),
  ];

  const fomorians = [
    makeSprite('fomorian',F_FM,A_FM,200,300, FM_W,FM_H, 1,15,  0),
    makeSprite('fomorian',F_FM,A_FM,300,150, FM_W,FM_H, 1,15,  1),
    makeSprite('fomorian',F_FM,A_FM,300,110, FM_W,FM_H, 1,15,  2),
    makeSprite('fomorian',F_FM,A_FM,200,110, FM_W,FM_H, 1,15,  3),
    makeSprite('fomorian',F_FM,A_FM,400,110, FM_W,FM_H, 1,15,  4),
    makeSprite('fomorian',F_FM,A_FM,300,150, FM_W,FM_H, 1,15,  5),
    makeSprite('fomorian',F_FM,A_FM,200,400, FM_W,FM_H, 1,15,  5),
    makeSprite('fomorian',F_FM,A_FM,200,400, FM_W,FM_H, 1,15,  6),
    makeSprite('fomorian',F_FM,A_FM,150,380, FM_W,FM_H, 1,15,  7),
    makeSprite('fomorian',F_FM,A_FM,300,300, FM_W,FM_H, 1,15, 10),
    makeSprite('fomorian',F_FM,A_FM,100,300, FM_W,FM_H, 1,15, 12),
    makeSprite('fomorian',F_FM,A_FM,320,240, FM_W,FM_H, 1,15, 14),
    makeSprite('fomorian',F_FM,A_FM,320,240, FM_W,FM_H, 1,15, 17),
    makeSprite('fomorian',F_FM,A_FM,250,280, FM_W,FM_H, 1,15, 22),
    makeSprite('fomorian',F_FM,A_FM,280,380, FM_W,FM_H, 1,15, 23),
  ];

  // ── Boss entities ─────────────────────────────────────────────────────
  const domnann = makeSprite('domnann',F_BOSS,A_BOSS_D,-100,-100, BS_W,BS_H, 2, 50, 31);
  const balor   = makeSprite('balor',  F_BOSS,A_BOSS_E,-100,-100, BS_W,BS_H, 3,100, 32);
  const eiric   = makeSprite('eiric',  F_BOSS,A_BOSS_E,-100,-100, BS_W,BS_H, 3,150, 33);
  const BOSSES  = [domnann, balor, eiric]; // index matches "bossesKilled" threshold

  // ── World state ───────────────────────────────────────────────────────
  let pageX=3, pageY=4;
  const page = () => pageY + pageX*5;
  let bossesKilled=0, minionsKilled=0;

  // ── Per-page obstacle tables ──────────────────────────────────────────
  // Each entry: {key, x, y, w, h}
  function pageObstacles(pg) {
    const O=[];
    function t1(x,y){O.push({key:'tree1',x,y,w:T1W,h:T1H});}
    function t2(x,y){O.push({key:'tree2',x,y,w:T2W,h:T2H});}
    function r1(x,y){O.push({key:'rock1',x,y,w:R1W,h:R1H});}
    function r2(x,y){O.push({key:'rock2',x,y,w:R2W,h:R2H});}
    function w1(x,y){O.push({key:'water1',x,y,w:WWW,h:WWH});}
    function w2(x,y){O.push({key:'water2',x,y,w:WWW,h:WWH});}
    function s1(x,y){O.push({key:'stone1',x,y,w:S1W,h:S1H});}
    function s2(x,y){O.push({key:'stone2',x,y,w:S2W,h:S2H});}
    function sw1(x,y){O.push({key:'swamp1',x,y,w:SWW,h:SWH});}
    function sw2(x,y){O.push({key:'swamp2',x,y,w:SWW,h:SWH});}
    function m1(x,y){O.push({key:'mtn',x,y,w:MW,h:MH});}
    function at(x,y){O.push({key:'atree',x,y,w:ATW,h:ATH});}
    function cs(x,y){O.push({key:'castle',x,y,w:CSW,h:CSH});}

    switch(pg) {
      case 0:
        for(let i=0;i<7;i++) t1(i*T1W,100);
        t1(0,T1H+100); t1(0,2*T1H+100); t1(0,3*T1H+100);
        t2(T1W,3*T2H+80); t2(2*T1W,T2H+100); t2(120,2*T2H+100);
        at(320,240);
        break;
      case 1:
        t1(0,100); t1(0,T1H+100); t1(T1W,3*T2H+80); t1(0,3*T1H+100);
        t1(200,200); t1(290,250); t1(350,300); t1(320,390); t1(450,190);
        t2(40,2*T1H+100); t2(2*T1W,T2H+100); t2(120,2*T2H+80); t2(500,280);
        break;
      case 2:
        t1(25,100); t1(50,T1H+100); t1(T1W+50,3*T2H+80); t1(50,3*T1H+100);
        t1(250,200); t1(340,250); t1(400,300); t1(300,300);
        t2(90,2*T1H+100); t2(2*T1W+50,T2H+100); t2(170,2*T2H+80);
        break;
      case 3:
        t1(T1W,3*T2H+80); t1(0,3*T1H+100); t1(250,200); t1(290,250);
        t1(400,300); t1(300,300);
        t2(90,2*T1H+100); t2(2*T1W+50,T2H+100); t2(170,2*T2H+80); t2(550,280);
        break;
      case 4:
        t2(200,200); t2(290,250); t2(350,300); t2(320,390);
        t2(450,190); t2(40,2*T1H+100); t2(2*T1W,T2H+100); t2(500,280);
        break;
      case 5:
        t2(200,200); t2(290,250); t2(350,300); t2(100,300);
        t1(40,200); t1(500,280); r1(450,190);
        break;
      case 6:
        t1(200,200); t1(290,250); t2(350,300); t2(100,300);
        t2(40,200); t2(500,280); r2(150,190);
        break;
      case 7:
        t2(200,240); t2(290,250); t2(350,300); t2(450,190);
        r1(300,390); r1(40,2*T1H+100); t1(2*T1W,140); r2(500,280);
        break;
      case 8:
        t1(200,200); t1(290,250); t1(400,130); t1(100,300);
        t2(40,200); t2(500,280); r2(150,190); r1(425,400);
        break;
      case 9:
        s1(300,100); s1(300,300); s2(150,200); s2(475,200);
        break;
      case 10:
        t2(200,300); t2(40,200); r2(425,400); r1(150,190);
        break;
      case 11:
        t2(200,200); t2(290,250); t2(400,130); t1(40,200);
        t1(500,280); r1(150,190); r2(425,400);
        break;
      case 12:
        t1(200,200); t1(400,130); t2(290,250); t2(40,200);
        t2(500,280); r1(150,320); r2(425,400);
        break;
      case 13:
        t1(200,200); r1(150,320); r1(400,130);
        r2(425,400); r2(40,200); r2(500,280);
        break;
      case 14:
        r1(500,300); r2(325,400); r2(140,200);
        break;
      case 15: {
        // Water channel + castle
        for(let c=1;c<=4;c++) for(let r=0;r<4;r++) {
          if(c===3&&r===3) continue; // bridge gap
          w2(WWW*c, WWH*r+100);
        }
        cs(WWW*2+WWW/2, 100);
        O.push({key:'bridge',x:WWW*3,y:WWH*3+60,w:BRW,h:BRH});
        break;
      }
      case 19:
        for(let i=0;i<7;i++) w1(i*WWW+40,400);
        r1(R1W,150); r2(400,300);
        break;
      case 25:
        for(let i=0;i<8;i++) sw2(i*SWW,100);
        sw1(4*SWW,100);
        sw2(7*SWW,SWH+100); sw1(7*SWW,2*SWH+100);
        sw2(7*SWW,3*SWH+100); sw1(7*SWW,4*SWH+100);
        break;
      case 27: case 28: case 29: {
        const yo = pg===27?125:100;
        for(let i=0;i<5;i++) { m1(560,i*MH+yo); m1(560-MW,i*MH+yo); }
        break;
      }
    }
    return O;
  }

  // ── Door definitions per page ─────────────────────────────────────────
  // to: destination page (31=lair1, 32=lair2, 33=lair3)
  function pageDoors(pg) {
    if (pg===0)  return [{x:300+(ATW/2),           y:240+ATH-DH,             to:32}];
    if (pg===29) return [{x:638-(MW*2),             y:480-MH*2-DH,            to:31}];
    if (pg===15) return [{x:(CSW/2)-(DW/2)+WWW*2+WWW/2, y:CSH-DH+101,        to:33}];
    return [];
  }

  // ── Enemy AI ──────────────────────────────────────────────────────────
  function runAI(e, obs) {
    if (e.x < 0 && e.y < 0) { e.x = 300; e.y = 200; }

    const xd = lugh.x - e.x, yd = lugh.y - e.y;
    let dx=0, dy=0;

    if (xd > 0) {
      if (yd > 0)  { xd>yd  ? (e.x+=e.speed,dx=e.speed,e.dir=D.EAST) : (e.y+=e.speed,dy=e.speed,e.dir=D.SOUTH); }
      else         { xd>-yd ? (e.x+=e.speed,dx=e.speed,e.dir=D.EAST) : (e.y-=e.speed,dy=-e.speed,e.dir=D.NORTH); }
    } else if (xd < 0) {
      if (yd > 0)  { -xd>yd  ? (e.x-=e.speed,dx=-e.speed,e.dir=D.WEST) : (e.y+=e.speed,dy=e.speed,e.dir=D.SOUTH); }
      else         { -xd>-yd ? (e.x-=e.speed,dx=-e.speed,e.dir=D.WEST) : (e.y-=e.speed,dy=-e.speed,e.dir=D.NORTH); }
    }

    // Obstacle push-back
    for (const o of obs) if (hitO(e,o)) { e.x-=dx; e.y-=dy; break; }

    // Screen clamp
    if      (e.x > SW-(e.w>>1))        e.x -= dx;
    else if (e.x < -(e.w>>1))          e.x = -(e.w>>1);
    else if (e.y > SH-(e.h>>1))        e.y -= dy;
    else if (e.y < -(e.h>>1)+OFFSET)   e.y = -(e.h>>1)+OFFSET;
  }

  // ── Combat ────────────────────────────────────────────────────────────
  function minionHit(e) {
    if (!e.active) return;
    if (!hitE(e, lugh)) return;
    if (lugh.iFrames > 0) return;

    if (lugh.attacking) {
      e.hp -= 5;
      knockEnemy(e);
      // Different damage sounds per enemy type (mirrors original game)
      play(e.key === 'firbolg' ? 'fbdmg' : 'fmdmg');
      if (e.hp <= 0) { e.active=false; e.x=-500; e.y=-500; minionsKilled++; }
    } else {
      lugh.hp -= 5;
      lugh.iFrames = 50;
      knockLugh();
      play('damage');
      // Different attack sounds per enemy type (mirrors original game)
      play(e.key === 'firbolg' ? 'fbatk' : 'fmatk');
    }
  }

  function bossHit(boss, dmgPerHit) {
    if (!boss.active) return;
    if (!hitE(boss, lugh)) return;
    if (lugh.iFrames > 0) return;

    if (lugh.attacking) {
      boss.hp -= 5;
      knockEnemy(boss);
      play('bossdmg');
      if (boss.hp <= 0) {
        boss.active=false; boss.x=-500; boss.y=-500;
        bossesKilled++;
        if (bossesKilled >= 3) { stopAll(); play('end'); state=S.WIN; }
      }
    } else {
      lugh.hp -= dmgPerHit;
      lugh.iFrames = 60;
      knockLugh();
      play('damage');
      play('bossatk');
    }
  }

  function knockLugh() {
    if (lugh.dir===D.SOUTH||lugh.dir===D.S_ATK||lugh.dir===D.S_IDL) lugh.y -= lugh.h+6;
    else if (lugh.dir===D.NORTH||lugh.dir===D.N_ATK||lugh.dir===D.N_IDL) lugh.y += lugh.h+6;
    else if (lugh.dir===D.WEST||lugh.dir===D.W_ATK||lugh.dir===D.W_IDL)  lugh.x += lugh.w+6;
    else lugh.x -= lugh.w+6;
  }

  function knockEnemy(e) {
    if (e.dir===D.SOUTH) e.y -= e.h+6;
    else if (e.dir===D.NORTH) e.y += e.h+6;
    else if (e.dir===D.WEST)  e.x += e.w+6;
    else e.x -= e.w+6;
  }

  // ── HUD ───────────────────────────────────────────────────────────────
  function drawHUD() {
    ctx.save();
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,SW,OFFSET);

    // HP bar
    const hpPct = Math.max(0, lugh.hp/lugh.maxHp);
    const col = hpPct>0.5 ? '#22cc22' : hpPct>0.25 ? '#ffaa00' : '#cc2222';
    ctx.fillStyle='#333'; ctx.fillRect(20,34,150,20);
    ctx.fillStyle=col;    ctx.fillRect(20,34,150*hpPct,20);
    ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(20,34,150,20);
    ctx.fillStyle='#aaddff'; ctx.font='bold 12px Georgia';
    ctx.fillText('Hit Points',20,26);
    ctx.fillStyle='#fff'; ctx.font='13px Georgia';
    ctx.fillText(`${Math.max(0,lugh.hp)} / ${lugh.maxHp}`,25,49);

    ctx.fillStyle='#aaddff'; ctx.font='bold 12px Georgia';
    ctx.fillText('Minions Killed',260,30);
    ctx.fillStyle='#fff'; ctx.font='bold 22px Georgia';
    ctx.textAlign='center'; ctx.fillText(minionsKilled,330,70); ctx.textAlign='left';

    ctx.fillStyle='#ffddaa'; ctx.font='bold 12px Georgia';
    ctx.fillText('Bosses Killed',455,30);
    ctx.fillStyle='#fff'; ctx.font='bold 22px Georgia';
    ctx.textAlign='center'; ctx.fillText(bossesKilled,530,70); ctx.textAlign='left';

    // Boss HP bar (centred, shown when in a lair)
    const pg=page();
    if (pg===31&&bossesKilled===0&&domnann.hp>0) bossBar('Domnann',domnann.hp,50,'#cc2222');
    if (pg===32&&bossesKilled===1&&balor.hp>0)   bossBar('Balor',  balor.hp, 100,'#9922cc');
    if (pg===33&&bossesKilled>=2&&eiric.hp>0)    bossBar('Eiric',  eiric.hp, 150,'#cc7700');

    ctx.restore();
  }

  function bossBar(name,hp,maxHp,col) {
    const bx=SW/2-100, by=8, bw=200, bh=14;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=col;    ctx.fillRect(bx,by,bw*Math.max(0,hp/maxHp),bh);
    ctx.strokeStyle='#aaa'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#fff'; ctx.font='bold 11px Georgia';
    ctx.textAlign='center';
    ctx.fillText(`${name}: ${Math.max(0,hp)} / ${maxHp}`, SW/2, by+11);
    ctx.textAlign='left';
  }

  // ── Direction helpers for Lugh ────────────────────────────────────────
  function toIdle() {
    const m = {[D.SOUTH]:D.S_IDL,[D.S_ATK]:D.S_IDL,
               [D.NORTH]:D.N_IDL,[D.N_ATK]:D.N_IDL,
               [D.WEST]: D.W_IDL,[D.W_ATK]:D.W_IDL,
               [D.EAST]: D.E_IDL,[D.E_ATK]:D.E_IDL};
    if (m[lugh.dir] !== undefined) lugh.dir = m[lugh.dir];
  }
  function toAtk() {
    const m = {[D.SOUTH]:D.S_ATK,[D.S_IDL]:D.S_ATK,
               [D.NORTH]:D.N_ATK,[D.N_IDL]:D.N_ATK,
               [D.WEST]: D.W_ATK,[D.W_IDL]:D.W_ATK,
               [D.EAST]: D.E_ATK,[D.E_IDL]:D.E_ATK};
    if (m[lugh.dir] !== undefined) lugh.dir = m[lugh.dir];
  }

  // ── MAIN LOOP ─────────────────────────────────────────────────────────
  const TARGET_FPS = 30;
  const FRAME_MS   = 1000 / TARGET_FPS;  // ~33 ms per frame
  // World grid: 6 columns (0-5) × 5 rows (0-4) = 30 main-world pages
  // Boss lairs are in column 6 (pageX=6), rows 1-3
  const MAX_PAGE_X     = 5;   // last valid x for main world scroll
  const MAX_PAGE_Y     = 4;   // last valid y for main world scroll
  const MAX_WORLD_PAGE = 30;  // pages 0-29 are main world; 30+ are special
  const LAIR_PAGE_X    = 6;   // all boss lairs sit in this virtual column

  let lastTs=0;

  function loop(ts) {
    requestAnimationFrame(loop);
    if (ts-lastTs < FRAME_MS) return;
    lastTs = ts;

    ctx.clearRect(0,0,SW,SH);

    // Loading gate
    if (state === S.LOADING) {
      if (loaded >= total) {
        state=S.INTRO;
        // Note: 'end' sound is the ambient title/credits music in the original game;
        // 'intro' is used as the game-over looping track. Both follow the original code.
        play('end');
      }
      drawLoadingScreen();
      return;
    }
    if (state===S.INTRO)   { doIntro(); return; }
    if (state===S.WIN)     { doWin();   return; }
    if (state===S.DEAD)    { doDead();  return; }

    doPlaying();
  }

  requestAnimationFrame(loop);

  // ── Screen draws ──────────────────────────────────────────────────────
  function drawLoadingScreen() {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,SW,SH);
    ctx.fillStyle='#FFD700'; ctx.font='bold 28px Georgia'; ctx.textAlign='center';
    ctx.fillText('Celtia – The Battle of Moytura', SW/2, 200);
    ctx.fillStyle='#aaa'; ctx.font='18px Georgia';
    const pct = total ? Math.round(loaded/total*100) : 0;
    ctx.fillText(`Loading… ${pct}%`, SW/2, 260);
    ctx.fillStyle='#333'; ctx.fillRect(160,290,320,20);
    ctx.fillStyle='#22aa22'; ctx.fillRect(160,290,320*pct/100,20);
    ctx.textAlign='left';
  }

  function doIntro() {
    drawFull('bgIntro');
    if (Math.floor(lastTs/500)%2===0) {
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(155,415,330,44);
      ctx.fillStyle='#FFD700'; ctx.font='bold 22px Georgia'; ctx.textAlign='center';
      ctx.fillText('Press SPACE to Begin', SW/2, 445);
      ctx.textAlign='left'; ctx.restore();
    }
    if (keys['Space']) {
      keys['Space']=false; stop('end'); play('arrival',true); state=S.PLAYING;
    }
  }

  function doWin() {
    drawFull('bgWin');
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(80,190,480,110);
    ctx.fillStyle='#FFD700'; ctx.font='bold 26px Georgia'; ctx.textAlign='center';
    ctx.fillText('🏆  Victory! You have saved Ireland!', SW/2, 228);
    ctx.fillStyle='#aaffaa'; ctx.font='18px Georgia';
    ctx.fillText(`Minions defeated: ${minionsKilled}  |  Bosses defeated: ${bossesKilled}`, SW/2, 260);
    if (Math.floor(lastTs/500)%2===0) {
      ctx.fillStyle='#aaaaff'; ctx.fillText('Press SPACE to play again', SW/2, 288);
    }
    ctx.textAlign='left'; ctx.restore();
    if (keys['Space']) { keys['Space']=false; resetGame(); }
  }

  function doDead() {
    drawFull('bg30');
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(90,175,460,130);
    ctx.fillStyle='#ff4444'; ctx.font='bold 30px Georgia'; ctx.textAlign='center';
    ctx.fillText('💀  Lugh has Fallen!', SW/2, 215);
    ctx.fillStyle='#ffaaaa'; ctx.font='17px Georgia';
    ctx.fillText('Ireland is lost to the darkness...', SW/2, 248);
    if (Math.floor(lastTs/500)%2===0) {
      ctx.fillStyle='#aaaaff'; ctx.fillText('Press SPACE to try again', SW/2, 280);
    }
    ctx.textAlign='left'; ctx.restore();
    if (keys['Space']) { keys['Space']=false; resetGame(); }
  }

  // ── Core game update ──────────────────────────────────────────────────
  function doPlaying() {
    const pg = page();

    // Background
    const bgImg = IMG[`bg${pg}`] || IMG['bg0'];
    if (bgImg && bgImg.complete && bgImg.naturalWidth>0)
      ctx.drawImage(bgImg, 0, 0, SW, SH);

    // Obstacles
    const obs = pageObstacles(pg);
    for (const o of obs) drawImg(o.key,0,0,o.w,o.h, o.x,o.y,o.w,o.h);

    // Doors
    const doors = pageDoors(pg);
    for (const d of doors) drawImg('door',0,0,DW,DH, d.x,d.y,DW,DH);

    // ── Player input ──────────────────────────────────────────────────
    lugh.moving    = false;
    lugh.attacking = false;
    let ldx=0, ldy=0;

    if (keys['ArrowRight']) { lugh.x+=lugh.speed; ldx= lugh.speed; lugh.moving=true; lugh.dir=D.EAST; }
    else if (keys['ArrowLeft'])  { lugh.x-=lugh.speed; ldx=-lugh.speed; lugh.moving=true; lugh.dir=D.WEST; }
    if (keys['ArrowDown']) { lugh.y+=lugh.speed; ldy= lugh.speed; lugh.moving=true; lugh.dir=D.SOUTH; }
    else if (keys['ArrowUp'])    { lugh.y-=lugh.speed; ldy=-lugh.speed; lugh.moving=true; lugh.dir=D.NORTH; }

    if (!lugh.moving && keys['Space']) {
      if (!lugh.attacking) play('attack'); // only play on first frame of attack
      lugh.attacking=true; toAtk();
    }
    if (!lugh.moving && !lugh.attacking) toIdle();

    // Door / lair entry is checked FIRST (before obstacle pushback)
    // so Lugh can walk into a door even if it overlaps a blocking sprite (e.g. castle)
    for (const d of doors) {
      if (hit(lugh.x,lugh.y,lugh.w,lugh.h, d.x,d.y,DW,DH)) {
        const ly = d.to - LAIR_PAGE_X * 5;   // lairY = to - lairX*5
        pageX=LAIR_PAGE_X; pageY=ly;
        lugh.x=SW/2-lugh.w/2; lugh.y=SH-lugh.h*2;
        stop('arrival'); play('evil',true);
        return;
      }
    }

    // Obstacle collision (Lugh) — castle is excluded from collision so door inside is reachable
    for (const o of obs) {
      if (o.key==='castle') continue;   // castle is visual-only; door entry handles it
      if (hitO(lugh,o)) { lugh.x-=ldx; lugh.y-=ldy; break; }
    }

    // ── Page scroll / boss lair exit ──────────────────────────────────
    if (lugh.x > SW-(lugh.w>>1)) {
      lugh.x-=ldx;
      if (pageX<MAX_PAGE_X && pg<MAX_WORLD_PAGE) { pageX++; lugh.x=-(lugh.w>>1); }
    } else if (lugh.x < -(lugh.w>>1)) {
      lugh.x = -(lugh.w>>1);
      if (pg===31) {
        pageX=MAX_PAGE_X; pageY=MAX_PAGE_Y;
        lugh.x=638-MW*2-DW*2; lugh.y=480-MH*2-DH;
        stop('evil'); play('arrival',true);
      } else if (pageX>0 && pg<MAX_WORLD_PAGE) { pageX--; lugh.x=SW-(lugh.w>>1); }
    } else if (lugh.y > SH-(lugh.h>>1)) {
      lugh.y-=ldy;
      if (pg===32) {
        pageX=0; pageY=0;
        lugh.x=300+ATW/2; lugh.y=240+ATH-DH+(lugh.h>>1);
        stop('evil'); play('arrival',true);
      } else if (pg===33) {
        pageX=3; pageY=0;
        lugh.x=(CSW/2)-(DW/2)+(WWW*2+WWW/2); lugh.y=CSH-DH+102+(lugh.h>>1);
        stop('evil'); play('arrival',true);
      } else if (pageY<MAX_PAGE_Y && pg<MAX_WORLD_PAGE) { pageY++; lugh.y=-(lugh.h>>1)+OFFSET; }
    } else if (lugh.y < -(lugh.h>>1)+OFFSET) {
      lugh.y = -(lugh.h>>1)+OFFSET;
      if (pageY>0 && pg<MAX_WORLD_PAGE) { pageY--; lugh.y=SH-(lugh.h>>1); }
    }

    // ── Enemies ───────────────────────────────────────────────────────
    for (const e of firBolgs) {
      if (!e.active || e.page!==pg) continue;
      runAI(e,obs); tick(e,e.aSpd);
      minionHit(e);
      if (e.active) drawE(e);
    }
    for (const e of fomorians) {
      if (!e.active || e.page!==pg) continue;
      runAI(e,obs); tick(e,e.aSpd);
      minionHit(e);
      if (e.active) drawE(e);
    }

    // Bosses
    if (pg===31 && bossesKilled===0) {
      if (!domnann.active) { domnann.active=true; domnann.x=300; domnann.y=200; }
      runAI(domnann,obs); tick(domnann,domnann.aSpd); bossHit(domnann,5); drawE(domnann);
    }
    if (pg===32 && bossesKilled===1) {
      if (!balor.active) { balor.active=true; balor.x=300; balor.y=200; }
      runAI(balor,obs); tick(balor,balor.aSpd); bossHit(balor,7); drawE(balor);
    }
    if (pg===33 && bossesKilled>=2) {
      if (!eiric.active) { eiric.active=true; eiric.x=300; eiric.y=200; }
      runAI(eiric,obs); tick(eiric,eiric.aSpd); bossHit(eiric,10); drawE(eiric);
    }

    // ── Draw Lugh (flash while invulnerable) ──────────────────────────
    // Always advance animation; just skip drawing every other 4-frame block when flashing
    tick(lugh, lugh.attacking?5:lugh.moving?lugh.aSpd:15);
    if (lugh.iFrames > 0) { lugh.iFrames--; if (Math.floor(lugh.iFrames/4)%2===0) drawE(lugh); }
    else { drawE(lugh); }

    // ── HUD ───────────────────────────────────────────────────────────
    drawHUD();

    // ── End conditions ────────────────────────────────────────────────
    if (lugh.hp<=0) { stopAll(); play('intro',true); state=S.DEAD; } // 'intro' = game-over track in original
    if (keys['Escape']) { keys['Escape']=false; stopAll(); play('end'); state=S.INTRO; }
  }

  // ── Game reset ────────────────────────────────────────────────────────
  function resetGame() {
    lugh.x=200; lugh.y=256; lugh.hp=lugh.maxHp;
    lugh.dir=D.SOUTH; lugh.iFrames=0; lugh.moving=false; lugh.attacking=false;
    lugh.aIdx=0; lugh.aTick=0;
    pageX=3; pageY=4; bossesKilled=0; minionsKilled=0;
    for (const e of [...firBolgs,...fomorians]) {
      e.active=true; e.hp=e.maxHp; e.x=e.startX; e.y=e.startY;
    }
    for (const b of BOSSES) {
      b.active=false; b.hp=b.maxHp; b.x=-100; b.y=-100;
    }
    stopAll(); play('arrival',true); state=S.PLAYING;
  }

  </script>
